<!DOCTYPE html>
<html>
<head>
    <title>Update Student Marks</title>
</head>
<body>
     <h2>Update Student Marks</h2>
<


    <!-- Input for Student ID -->
    <label>Student ID:</label>
    <input type="number" id="student_id">
    <br><br>

    <!-- Input for new Marks -->
    <label>New Marks:</label>
    <input type="number" id="marks">
    <br><br>

    <button onclick="updateStudent()">Update</button>
    <h3 id="result"></h3>

    <script>
        async function updateStudent() {

            const id = document.getElementById("student_id").value;
            const marks = document.getElementById("marks").value;

            // Send PATCH request to FastAPI
            const response = await fetch(`/update/${id}/${marks}`, {
                method: "PATCH"
            });
            // converting the data into json format
            const data = await response.json();

            // Showing response on screen
            document.getElementById("result").innerHTML =
                data.msg + "<br>" + JSON.stringify(data.data);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h2>Student Management Form</h2>

    <form id="studentForm" action="/students">

        <label>Student ID:</label>
        <input type="number" id="student_id" required>
        <br><br>

        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>

        <label>Age:</label>
        <input type="number" id="age" required>
        <span id="msg"></span>
        <br><br>

        <label>Marks:</label>
        <input type="number" id="marks" required>
        <span id="mesg"></span>
        <br><br>

        <label>Course:</label>
        <input type="text" id="course" required>
        <br><br>

        <button type="submit">Submit</button>

    </form>

    <h3 id="result"></h3>

    <script>
        document.getElementById("studentForm").addEventListener("submit", async (e) => {

            e.preventDefault();

            const studentData = {
                student_id: Number(document.getElementById("student_id").value),
                name: document.getElementById("name").value,
                age: Number(document.getElementById("age").value),
                marks: Number(document.getElementById("marks").value),
                course: document.getElementById("course").value
            };
            console.log(studentData.age)
            if (studentData.age>100)
            {
                document.getElementById('msg').innerHTML = "Age Greater Than 100 Not allowed"
            }
            if( studentData.age<0)
            {
                document.getElementById('msg').innerHTML = "Age can not be negative"
            }
            if (studentData.marks>100)
            {
                document.getElementById('mesg').innerHTML = "Marks should not be greater than 100"

            }
            if (studentData.marks<0)
            {
                document.getElementById('mesg').innerHTML = "Marks can not be negative"
            }
                else

        {
            // Send student data to FastAPI using POST request
            const response = await fetch("/students", {
                method: "POST",
                // Tell server that data is in JSON format
                headers: {
                    "Content-Type": "application/json"
                },
                // Convert JavaScript object into JSON string
                body: JSON.stringify(studentData)
            });
            // Get response returned by FastAPI
            const data = await response.json();
            // Show success message and returned student data on page
            document.getElementById("result").innerHTML =
                data.msg + data.warn+"<br>" + JSON.stringify(data.data);
          };
      })
    </script>

</body>
</html>
